set-option -g default-shell /opt/homebrew/bin/bash
set-option -g history-limit 1000000
set -g set-titles on
set -g focus-events on
set -g set-titles-string "#{?#{&&:#{@claude_idle},#{!=:#{client_focused},1}},● ,}#S  #T"
# Mouse on so the scroll wheel scrolls the tmux pane (instead of the
# terminal's block/scrollback history) and click-to-switch-pane works.
# `copy-pipe-no-clear` is the right command here: pipes the selection
# through pbcopy AND keeps the selection highlighted AND stays in
# copy-mode at the current scroll position. The other variants are wrong
# for "copy on select while preserving scroll":
#   - `copy-pipe-and-cancel`: pipes correctly but exits copy-mode, which
#     snaps the view back to the live tail.
#   - `copy-pipe`: documented as "pipe then clear selection" but in
#     practice the clear can race the pipe and pbcopy ends up empty.
# Press q or Escape to leave copy-mode and return to the live tail.
# `copy-mode` covers the default emacs mode-keys; `copy-mode-vi` is a
# safety net in case mode-keys ever flips to vi.
set -g mouse on
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
