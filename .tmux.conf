set-option -g default-shell /opt/homebrew/bin/bash
set-option -g history-limit 1000000
set -g set-titles on
set -g focus-events on
set -g set-titles-string "#{?#{&&:#{@claude_idle},#{!=:#{client_focused},1}},● ,}#S  #T"
# Mouse on so the scroll wheel scrolls the tmux pane (instead of the
# terminal's block/scrollback history) and click-to-switch-pane works.
# The two bindings below route a drag-select straight into the macOS
# clipboard via pbcopy on mouse-release, restoring copy-on-select.
# `copy-mode` covers the default emacs mode-keys; `copy-mode-vi` is a
# safety net in case mode-keys ever flips to vi.
set -g mouse on
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
