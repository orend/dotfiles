set-option -g default-shell /opt/homebrew/bin/bash
set-option -g history-limit 1000000
set -g set-titles on
set -g focus-events on
set -g set-titles-string "#{?#{&&:#{@claude_idle},#{!=:#{client_focused},1}},● ,}#S  #T"
# Mouse off so terminal-native click-and-drag selection (copy-on-select in
# Warp/iTerm/Terminal.app) keeps working. With `mouse on`, tmux intercepts
# the events and the terminal never sees the selection. Re-enable only if
# you add a `bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel pbcopy`
# binding to route selections back to the system clipboard.
set -g mouse off
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
