set-option -g default-shell /opt/homebrew/bin/bash
set-option -g history-limit 1000000
set -g set-titles on
set -g focus-events on
set -g set-titles-string "#{?#{&&:#{@claude_idle},#{!=:#{client_focused},1}},● ,}#S  #T"
# Mouse on so the scroll wheel scrolls the tmux pane (instead of the
# terminal's block/scrollback history) and click-to-switch-pane works.
# `copy-pipe` (NOT `copy-pipe-and-cancel`) is deliberate: the `-and-cancel`
# variant exits copy-mode on mouse release, which snaps the view to the
# live tail and undoes your scroll. With plain `copy-pipe`, the selection
# is copied to pbcopy, the selection visual clears as "copy done" feedback,
# and the pane stays at your scroll position. Press q or Escape to return
# to the live tail when you're ready.
# `copy-mode` covers the default emacs mode-keys; `copy-mode-vi` is a
# safety net in case mode-keys ever flips to vi.
set -g mouse on
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
